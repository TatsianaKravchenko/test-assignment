services:
  mongodb:
    image: mongo:latest
    container_name: nest_monorepo_mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:17
    container_name: nest_monorepo_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: analytics_db
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d analytics_db']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis/redis-stack:latest
    container_name: test_assignment_redis
    ports:
      - '6379:6379'
      - '8001:8001'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  data-processor:
    build:
      context: ./backend
      dockerfile: Dockerfile.data-processor
    container_name: nest_data_processor
    ports:
      - '3000:3000'
    environment:
      - MONGO_HOST=mongodb
      - REDIS_HOST=redis
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3000/api', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  analytics-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.analytics-service
    container_name: nest_analytics_service
    ports:
      - '3001:3001'
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=analytics_db
      - REDIS_HOST=redis
      - REPORT_GRPC_URL=report-service:50051
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      report-service:
        condition: service_started
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3001/api', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  report-service:
    build:
      context: ./report-service
      dockerfile: Dockerfile
    container_name: nest_report_service
    ports:
      - '50051:50051'
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GRPC_PORT=50051
    depends_on:
      redis:
        condition: service_healthy

volumes:
  mongo_data:
  pg_data:
  redis_data:
