version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: nest_monorepo_mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  postgres:
    image: postgres:latest
    container_name: nest_monorepo_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: analytics_db
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql

  redis:
    image: redis:alpine
    container_name: nest_monorepo_redis
    ports:
      - '6379:6379'

volumes:
  mongo_data:
  pg_data:
