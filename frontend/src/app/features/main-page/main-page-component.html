<div class="container" #gridContainer>
  <h1>Catalog Items</h1>

  <app-search-input> </app-search-input>

  @if (isLoading() && products().length === 0) {
    <div class="loader-container">
      <mat-spinner mode="indeterminate" diameter="50"></mat-spinner>
      <p class="loading-text">Searching the catalog...</p>
    </div>
  } @else {
    <cdk-virtual-scroll-viewport
      itemSize="384"
      class="products-viewport"
      (scrolledIndexChange)="onScroll($event)"
    >
      <div
        *cdkVirtualFor="let row of productRows(); trackBy: trackRow"
        class="product-grid-row"
        [style.grid-template-columns]="gridTemplate()"
      >
        @for (product of row; track product.id) {
          <app-product-card [product]="product" (click)="openDetails(product)"></app-product-card>
        }
      </div>

      @if (products().length === 0) {
        <div class="no-results">
          <p>No products match your search query.</p>
        </div>
      }

      @if (isLoading() && products().length > 0) {
        <div class="bottom-loader">
          <mat-spinner diameter="30"></mat-spinner>
        </div>
      }
    </cdk-virtual-scroll-viewport>
  }
</div>
